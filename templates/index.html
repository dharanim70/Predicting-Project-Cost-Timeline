<!DOCTYPE html>
<html>
<head>
    <title>Predicting Project Cost and Timeline</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Predicting Project Cost and Timeline</h1>

<form action="/predict" method="POST">

<label>Team Size</label>
<input type="number" name="team_size" required>

<label>Number of Tasks</label>
<input type="number" name="number_of_tasks" required>

<label>Project Complexity (1-5)</label>
<input type="number" name="project_complexity" min="1" max="5" required>

<label>Resource Requirements (₹)</label>
<input type="number" name="resource_requirements" required>

<button type="submit">Predict</button>

</form>

{% if predicted_cost %}

<h2>Prediction Result</h2>

<p><b>Estimated Cost:</b> ₹ {{ predicted_cost }}</p>

<p><b>Estimated Timeline:</b> {{ predicted_timeline }} Days</p>

{% endif %}

</div>

</body>
</html>
