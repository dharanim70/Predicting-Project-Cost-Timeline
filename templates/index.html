<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Project Cost & Timeline Prediction</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:500px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
box-shadow:0 8px 32px rgba(0,0,0,0.25);
color:white;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:28px;
margin-bottom:8px;
}

.header p{
font-size:14px;
opacity:0.9;
}

label{
display:block;
margin-top:15px;
margin-bottom:6px;
font-weight:600;
}

input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:10px;
font-size:15px;
background:rgba(255,255,255,0.9);
}

button{
width:100%;
margin-top:25px;
padding:14px;
border:none;
border-radius:12px;
background:#00c853;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
}

.result{
margin-top:25px;
padding:15px;
border-radius:15px;
background:white;
color:#333;
}

.cost-card{
background:#e8f5e9;
padding:15px;
border-radius:12px;
margin-top:10px;
text-align:center;
}

.time-card{
background:#e3f2fd;
padding:15px;
border-radius:12px;
margin-top:10px;
text-align:center;
}

.error{
margin-top:20px;
background:#ffebee;
color:#c62828;
padding:12px;
border-radius:10px;
text-align:center;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
opacity:0.9;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🤖 AI Project Predictor</h1>
<p>AI-Powered Cost & Timeline Estimation System</p>
</div>

<form action="/predict" method="POST">

<label>📁 Project Size</label>
<input type="number" name="project_size" required>

<label>👥 Team Size</label>
<input type="number" name="team_size" required>

<label>⚙️ Complexity (1-5)</label>
<input type="number" name="complexity" min="1" max="5" required>

<label>⭐ Team Experience (Years)</label>
<input type="number" name="experience" required>

<button type="submit">🚀 Predict Project</button>
</form>
{% if error %}
<div class="error">
{{ error }}
</div>
{% endif %}

{% if has_result %}

<div class="result">

<h2 style="text-align:center;color:#333;">✅ Prediction Result</h2>

<div class="cost-card">
<h3>💰 Estimated Project Cost</h3>
<h2 style="color:green;">₹ {{ cost }}</h2>
</div>

<div class="time-card">
<h3>📅 Estimated Timeline</h3>
<h2 style="color:#1565c0;">{{ timeline }} Days</h2>
</div>

</div>

{% endif %}

<div class="footer">
<p>Developed using Python • Flask • Machine Learning</p>
</div>

</div>

</body>
</html>
